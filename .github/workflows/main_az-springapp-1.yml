name: Build and deploy JAR app to Azure Web App - az-springapp-1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Build (creates Spring Boot fat jar)
        run: mvn -B clean package -DskipTests

      - name: Select Spring Boot fat jar (must contain BOOT-INF) and rename to app.jar
        shell: pwsh
        run: |
          $candidates = Get-ChildItem -Path "target" -Filter "*.jar" |
            Where-Object { $_.Name -notmatch "original" }

          if ($candidates.Count -eq 0) { throw "No jar files found in target/" }

          foreach ($j in ($candidates | Sort-Object Length -Descending)) {
            Write-Host "Checking jar: $($j.Name) size=$([Math]::Round($j.Length/1MB,2))MB"
            $hasBootInf = & jar tf $j.FullName | Select-String -Pattern "^BOOT-INF/" -Quiet
            if ($hasBootInf) {
              Write-Host "Selected Spring Boot fat jar: $($j.Name)"
              Copy-Item $j.FullName "app.jar" -Force
              exit 0
            }
          }

          throw "No Spring Boot fat jar found. Ensure spring-boot-maven-plugin repackage runs."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: app.jar

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Verify BOOT-INF exists in app.jar
        shell: pwsh
        run: |
          if (-not (Test-Path "app.jar")) { throw "app.jar missing" }
          $hasBootInf = & jar tf "app.jar" | Select-String -Pattern "^BOOT-INF/" -Quiet
          if (-not $hasBootInf) { throw "Deployed jar is NOT a Spring Boot fat jar (BOOT-INF missing)." }

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2410CB5FAB11471685C3811406A6ED3D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0205438021E14519A236E0E4898D7EBE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C82F7FF1CCC3466095DA9992A78E4ED8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "az-springapp-1"
          slot-name: "Production"
          package: app.jar