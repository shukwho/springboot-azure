# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions


name: Build and deploy JAR app to Azure Web App - az-springapp-1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Build with Maven (Spring Boot fat jar)
        run: mvn -B clean package -DskipTests

      - name: Pick Spring Boot runnable jar and rename to app.jar
        shell: pwsh
        run: |
          Write-Host "Listing target directory:"
          Get-ChildItem -Path "target" -Force

          # Exclude "original-*.jar" if present (Spring Boot plugin sometimes creates it)
          $jars = Get-ChildItem -Path "target" -Filter "*.jar" | Where-Object { $_.Name -notmatch "original" }

          if ($null -eq $jars -or $jars.Count -eq 0) {
            throw "No jar found in target/. Build may have failed."
          }

          # Pick the largest jar (usually the Spring Boot fat jar)
          $jar = $jars | Sort-Object Length -Descending | Select-Object -First 1
          Write-Host "Using jar: $($jar.Name) size=$([Math]::Round($jar.Length/1MB,2))MB"

          Copy-Item $jar.FullName "app.jar" -Force

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: app.jar

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Verify artifact exists
        shell: pwsh
        run: |
          Get-ChildItem -Force
          if (-not (Test-Path "app.jar")) { throw "app.jar not found after download-artifact" }

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2410CB5FAB11471685C3811406A6ED3D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0205438021E14519A236E0E4898D7EBE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C82F7FF1CCC3466095DA9992A78E4ED8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "az-springapp-1"
          slot-name: "Production"
          package: app.jar